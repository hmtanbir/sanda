services:
  mysql:
    image: mysql:9.4.0
    container_name: sanda_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-sanda}_development
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 3s
      timeout: 5s
      retries: 5
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    networks:
      - sanda-network
  redis:
    image: redis:alpine
    container_name: sanda_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: always
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB:-0}
    healthcheck:
      test: [ "CMD-SHELL", "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping | grep PONG" ]
      interval: 3s
      timeout: 5s
      retries: 5
    networks:
      - sanda-network
    volumes:
      - redisdata:/data
  api:
    build: .
    container_name: sanda
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    ports:
      - ${PORT:-3001}:3000
    environment:
      - DB_ADAPTER=mysql2
      - DB_ENCODING=utf8mb4
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_POOL=5
      - DB_NAME=${DB_NAME:-sanda}_development
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD:-root}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - sanda-network

volumes:
  mysqldata:
  redisdata:

networks:
  sanda-network:
    driver: bridge

