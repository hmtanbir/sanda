services:
  postgres:
    image: postgres:16-alpine
    command: >
      postgres 
      -c shared_buffers=512MB
      -c effective_cache_size=512MB
      -c work_mem=64MB
      -c max_connections=100
    container_name: sanda_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-sanda}_development
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -h localhost -U $$POSTGRES_USER -d $$POSTGRES_DB' ]
      interval: 3s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sanda-network
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 2G
        reservations:
          cpus: "1.00"
          memory: 1G
  redis:
    image: redis:alpine
    container_name: sanda_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: always
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB:-0}
    healthcheck:
      test: [ "CMD-SHELL", "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping | grep PONG" ]
      interval: 3s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data  
    networks:
      - sanda-network
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M  
  api:
    build: .
    container_name: sanda
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - ${PORT:-3001}:3000
    environment:
      - DB_ADAPTER=postgresql
      - DB_ENCODING=utf8
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_POOL=5
      - DB_NAME=${DB_NAME:-sanda}_development
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - sanda-network
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 1536M
        reservations:
          cpus: "1.00"
          memory: 512M

volumes:
  postgres_data:
  redis_data:

networks:
  sanda-network:
    driver: bridge
